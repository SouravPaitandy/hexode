version: '3.8'

services:
  devdock-server:
    build: ./server
    container_name: devdock-server
    ports:
      - "3001:3001" # API
      - "1234:1234" # WebSocket
    environment:
      # Optional: set PISTON_URL to use a self-hosted Piston instance instead of Judge0 CE
      # - PISTON_URL=http://piston:2000/api/v2/execute
    networks:
      - devdock-network

  devdock-client:
    build: ./client
    container_name: devdock-client
    ports:
      - "80:80"
    depends_on:
      - devdock-server
    networks:
      - devdock-network

networks:
  devdock-network:
    driver: bridge
